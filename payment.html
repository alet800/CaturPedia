<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <link rel="stylesheet" href="payment.css">
</head>
<body>
    
<div class="container">
    <div class="card-container">
        <div class="front">
            <div class="image">
                <img src="./image/chip.png" alt="">
                <img src="./image/visa.png" alt="">
            </div>
            <div class="card-number-box">################</div>
            <div class="flexbox">
                <div class="box">
                    <span>card holder</span>
                    <div class="card-holder-name ">full name</div>
                </div>
                <div class="box">
                    <span>expiress</span>
                    <div class="expiration">
                        <span class="exp-moth">mm</span>
                        <span class="exp-year">yy</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="back">
            <div class="stripe"></div>
            <div class="box">
                <span>cvv</span>
                <div class="cvv-box"></div>
                <img src="./image/visa.png" alt="">
            </div>
        </div>
    </div>
    <form action="shop.html">
        <div class="inputBox">
            <span>card number</span>
            <input type="text" maxlength="19" class="card-number-input">
        </div>
        <div class="inputBox">
            <span>card holder</span>
            <input type="text" maxlength="16" class="card-holder-input">
        </div>
        <div class="flexbox">
            <div class="inputBox">
                <span>expiration mm</span>
                <select name="" id="" class="moth-input">
                    <option value="moth" selected disabled>moth</option>
                    <option value="01">01</option>
                    <option value="02">02</option>
                    <option value="03">03</option>
                    <option value="04">04</option>
                    <option value="05">05</option>
                    <option value="06">06</option>
                    <option value="07">07</option>
                    <option value="08">08</option>
                    <option value="09">09</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
            </div>
            <div class="inputBox">
                <span>expiration yy</span>
                <select name="" id="" class="year-input">
                    <option value="year" selected disabled>year</option>
                    <option value="2026">2026</option> 
                    <option value="2027">2027</option> 
                    <option value="2028">2028</option> 
                    <option value="2029">2029</option> 
                    <option value="2030">2030</option> 
                    <option value="2031">2031</option> 
                    <option value="2032">2032</option> 
                    <option value="2033">2033</option> 
                    <option value="2034">2034</option> 
                    <option value="2035">2035</option> 
                    <option value="2036">2036</option> 
                </select>
            </div>
            <div class="inputBox">
                <span>cvv</span>
                <input type="text" maxlength="4" class="cvv-input">
            </div>
        </div>
        <input type="submit" value="submit" class="submit-btn" id="submitbtn" disabled>
       
    </form>
</div>


<script>

document.querySelector('.card-number-input').oninput = (e) => {
    let value = e.target.value.replace(/[^0-9]/g, '');
    
    value = value.slice(0, 16);
    
    value = value.match(/.{1,4}/g)?.join(' ') || value;
    
    e.target.value = value;
    document.querySelector('.card-number-box').innerText = value || '################';
}
document.querySelector('.card-holder-input').oninput = (e) => {

    let value = e.target.value.replace(/[^A-Za-z\s]/g,'');

    value = value.slice(0,30);

    e.target.value = value;

    document.querySelector('.card-holder-name').innerText =
        value || 'full name';
}
document.querySelector('.moth-input').oninput = () => {
    document.querySelector('.exp-moth').innerText = document.querySelector('.moth-input').value || 'mm';
    document.querySelector('.moth-input').oninput = (e) => {
    let val = e.target.value;
    document.querySelector('.exp-moth').innerText = (val === 'moth') ? 'mm' : val;
}
}
document.querySelector('.year-input').oninput = () => {
    document.querySelector('.exp-year').innerText = document.querySelector('.year-input').value || 'yy';
}

document.querySelector('.cvv-input').onfocus = () => {
    document.querySelector('.front').style.transform = 'perspective(1000px) rotateY(180deg)';
    document.querySelector('.back').style.transform = 'perspective(1000px) rotateY(0deg)';
}
document.querySelector('.cvv-input').onblur = () => {
    document.querySelector('.front').style.transform = 'perspective(1000px) rotateY(0deg)';
    document.querySelector('.back').style.transform = 'perspective(1000px) rotateY(-180deg)';
}
document.querySelector('.cvv-input').oninput = (e) => {

    let value = e.target.value.replace(/[^0-9]/g,'');

    value = value.slice(0,4);

    e.target.value = value;

    document.querySelector('.cvv-box').innerText = value;

}

const cardNumber = document.querySelector('.card-number-input');
const cardHolder = document.querySelector('.card-holder-input');
const monthInput = document.querySelector('.moth-input');
const yearInput = document.querySelector('.year-input');
const cvvInput = document.querySelector('.cvv-input');
const submitBtn = document.getElementById('submitbtn');


function checkInputs() {
    const isCardNumberFilled = cardNumber.value.trim() !== '';
    const isCardHolderFilled = cardHolder.value.trim() !== '';
    const isMonthSelected = monthInput.value !== 'moth';
    const isYearSelected = yearInput.value !== 'year';
    const isCvvFilled = cvvInput.value.trim() !== '';

    if (isCardNumberFilled && isCardHolderFilled && isMonthSelected && isYearSelected && isCvvFilled) {
        submitBtn.disabled = false;
        submitBtn.style.cursor = 'pointer';
        submitBtn.style.opacity = '1';
    } else {
        submitBtn.disabled = true;
        submitBtn.style.cursor = 'not-allowed';
        submitBtn.style.opacity = '0.5';
    }
}


cardNumber.addEventListener('input', checkInputs);
cardHolder.addEventListener('input', checkInputs);
monthInput.addEventListener('change', checkInputs); 
yearInput.addEventListener('change', checkInputs);
cvvInput.addEventListener('input', checkInputs);

checkInputs();

</script>

</body>
</html>
